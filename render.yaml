# Render Blueprint for the Orbit backend (NestJS + Socket.IO).
#
# In the Render dashboard: New → Blueprint → connect this repo. Render reads
# this file and creates the API web service. You still paste in DATABASE_URL
# (Neon) and REDIS_URL (Upstash) + CORS_ORIGIN (your Vercel URL) as env vars —
# the two JWT secrets are auto-generated by Render.
#
# Free tier note: the web service spins down after ~15 min idle and cold-starts
# in ~50s on the next request — fine for occasional use by a couple.
services:
  - type: web
    name: orbit-api
    runtime: node
    plan: free
    region: singapore
    branch: main
    # --include=dev is required because NODE_ENV=production otherwise makes npm
    # skip devDependencies (typescript, @nestjs/cli, prisma) that the build needs.
    buildCommand: npm install --include=dev && npm run build:shared && npm run prisma:generate --workspace=apps/api && npm run build:api
    startCommand: npm run prisma:deploy --workspace=apps/api && node apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      # Set to "false" to send real OTP emails (needs the SMTP_* vars below).
      - key: OTP_DEV_MODE
        value: "false"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Fill these in the Render dashboard after creating the service:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      # Email (Gmail SMTP + App Password) — fill in the dashboard:
      - key: EMAIL_FROM
        value: "Orbit <spyrajnish@gmail.com>"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
